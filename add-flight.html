<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnoAir - Add Flight</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="header">
        <h1><a href="index.html">OnoAir</a></h1>
    </div>
    <div class="main">
        <h2>New Flight</h2>
        <form id="add-flight-form">
			<p>Flight No.: <input type="text" id="flight-no" required></p>
            <p>
                Origin: 
                <select id="origin" required>
                    <!-- אפשרויות יוזנו דינמית -->
                </select>
            </p>
            <p>
                Destination: 
                <select id="destination" required>
                    <!-- אפשרויות יוזנו דינמית -->
                </select>
            </p>
            <p>Boarding date: <input type="date" id="boarding-date" required></p>
            <p>Boarding time: <input type="time" id="boarding-time" required></p>
            <p>Arrival date: <input type="date" id="arrival-date" required></p>
            <p>Arrival time: <input type="time" id="arrival-time" required></p>
            <p>No. of seats: <input type="number" id="seats" required></p>
            <button type="submit">Save</button>
        </form>
    </div>
    <div class="footer">
	<a href="help.html" class="help-icon" aria-label="Help">
        <span>?</span>
    </a>
    </div>

    <script src="js/addFlight.js"></script> <!-- קישור לקובץ ה-JavaScript -->
</body>
</html>
