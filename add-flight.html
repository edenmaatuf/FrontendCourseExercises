<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnoAir - Add Flight</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="header">
        <h1>OnoAir</h1>
    </div>
    <div class="main">
        <h2>New Flight</h2>
        <form>
            <p>Flight No.: <input type="text" name="flight-no" required></p>
            <p>Origin: <input type="text" name="origin" required></p>
            <p>Destination: <input type="text" name="destination" required></p>
            <p>Boarding date: <input type="date" name="boarding-date" required></p>
            <p>Boarding time: <input type="time" name="boarding-time" required></p>
            <p>Arrival date: <input type="date" name="arrival-date" required></p>
            <p>Arrival time: <input type="time" name="arrival-time" required></p>
            <p>No. of seats: <input type="number" name="seats" required></p>
            <button type="submit">Save</button>
        </form>
    </div>
    <div class="footer">
        <p>Add Flight Footer</p>
    </div>
</body>
</html>
