<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnoAir - Add Destination</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="header">
        <h1>OnoAir</h1>
    </div>
    <div class="main">
        <h2>New Destination</h2>
        <form>
            <p>Destination code: <input type="text" name="destination-code" required></p>
            <p>Destination name: <input type="text" name="destination-name" required></p>
            <p>Airport name: <input type="text" name="airport-name" required></p>
            <p>Airport url: <input type="url" name="airport-url" required></p>
            <p>Image url: <input type="url" name="image-url"></p>
            <button type="submit">Save</button>
        </form>
    </div>
    <div class="footer">
        <p>Add Destination Footer</p>
    </div>
</body>
</html>
